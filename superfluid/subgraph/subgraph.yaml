specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: AudityzerFlows
    network: optimism-sepolia
    source:
      address: "0xcfa132e353cb4e398080b9700609bb008eceb125"
      abi: CFAv1Forwarder
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Stream
        - AudityzerTVL
      abis:
        - name: CFAv1Forwarder
          file: ./abis/CFAv1Forwarder.json
      eventHandlers:
        - event: FlowUpdated(indexed address,indexed address,indexed address,int96,int256,int256,bytes)
          handler: handleFlowUpdated
      file: ./src/mapping.ts
