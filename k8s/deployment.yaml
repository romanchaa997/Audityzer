apiVersion: apps/v1
kind: Deployment
metadata:
  name: audityzer
  namespace: audityzer
  labels:
    app: audityzer
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audityzer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: audityzer
        version: v1
    spec:
      imagePullSecrets:
      - name: docr-secret
      containers:
      - name: audityzer
        image: registry.digitalocean.com/auditorsec/audityzer:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
        - name: LOG_LEVEL
          value: "info"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: audityzer-secrets
              key: database-url
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: reports
          mountPath: /app/reports
      volumes:
      - name: config
        configMap:
          name: audityzer-config
      - name: reports
        persistentVolumeClaim:
          claimName: audityzer-reports
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audityzer-mcp
  namespace: audityzer
  labels:
    app: audityzer-mcp
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audityzer-mcp
  template:
    metadata:
      labels:
        app: audityzer-mcp
        version: v1
    spec:
      imagePullSecrets:
      - name: docr-secret
      containers:
      - name: mcp-server
        image: registry.digitalocean.com/auditorsec/audityzer-mcp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: MCP_PORT
          value: "8080"
        - name: AUDITYZER_URL
          value: "http://audityzer-service:5000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
