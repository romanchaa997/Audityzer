apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mqtt-gateway.fullname" . }}
  labels:
    {{- include "mqtt-gateway.labels" . | nindent 4 }}
data:
  mosquitto.conf: |
    # Mosquitto Configuration for DaBROIoTEXs IoT Gateway
    # Generated by Helm chart

    # General
    per_listener_settings false
    max_connections {{ .Values.env.MQTT_MAX_CONNECTIONS | default "1000" }}
    message_size_limit {{ .Values.env.MQTT_MAX_PACKET_SIZE | default "65536" }}

    # Authentication
    allow_anonymous {{ .Values.mosquitto.allowAnonymous }}
    password_file {{ .Values.mosquitto.passwordFile }}
    acl_file {{ .Values.mosquitto.aclFile }}

    # Persistence
    persistence {{ .Values.mosquitto.persistence }}
    persistence_location {{ .Values.mosquitto.persistenceLocation }}
    autosave_interval 60

    # Logging
    log_dest {{ .Values.mosquitto.logDest }}
    log_type {{ .Values.mosquitto.logType }}
    log_timestamp true
    log_timestamp_format %Y-%m-%dT%H:%M:%S

    # MQTT Listener (plain TCP for IoT devices on local network)
    listener 1883
    protocol mqtt

    # MQTTS Listener (TLS for secure connections)
    listener 8883
    protocol mqtt
    # certfile and keyfile configured via mounted secrets
    # certfile /mosquitto/certs/tls.crt
    # keyfile /mosquitto/certs/tls.key

    # WebSocket Listener (for web dashboard and ingress)
    listener 9001
    protocol websockets

  acl: |
    {{- .Values.mosquitto.acl | nindent 4 }}
