# =============================================================================
# AuditorSEC / DaBROIoTEXs — Local Development Stack
# docker compose up -d
# =============================================================================

services:
  # ── Platform (Express + Vite + React) ─────────────────────────────────────
  platform:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.platform
    container_name: auditorsec-platform
    restart: unless-stopped
    ports:
      - "${PLATFORM_PORT:-3000}:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-auditorsec}:${POSTGRES_PASSWORD:-auditorsec}@postgres:5432/${POSTGRES_DB:-auditorsec}
      - REDIS_URL=redis://redis:6379
      - MQTT_URL=mqtt://mosquitto:1883
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - auditorsec
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: auditorsec-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-auditorsec}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-auditorsec}
      - POSTGRES_DB=${POSTGRES_DB:-auditorsec}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auditorsec
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditorsec}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: auditorsec-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - auditorsec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Mosquitto MQTT Broker ─────────────────────────────────────────────────
  mosquitto:
    build:
      context: .
      dockerfile: Dockerfile.mqtt
    container_name: auditorsec-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - auditorsec
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/broker/uptime", "-C", "1", "-W", "3"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: auditorsec-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-auditorsec}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - auditorsec

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: auditorsec-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - auditorsec

  # ── Telegram Bot ───────────────────────────────────────────────────────────
  bot:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.bot
    container_name: auditorsec-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-auditorsec}:${POSTGRES_PASSWORD:-auditorsec}@postgres:5432/${POSTGRES_DB:-auditorsec}
      - REDIS_URL=redis://redis:6379
      - MQTT_URL=mqtt://mosquitto:1883
      - PLATFORM_URL=http://platform:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auditorsec

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  grafana_data:
  prometheus_data:

networks:
  auditorsec:
    driver: bridge
    name: auditorsec-network
