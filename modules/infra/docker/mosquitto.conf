# =============================================================================
# AuditorSEC — Mosquitto MQTT Broker Configuration
# =============================================================================

# ── Listeners ────────────────────────────────────────────────────────────────
# Plain MQTT
listener 1883
protocol mqtt

# WebSocket (for Grafana / dashboards)
listener 9001
protocol websockets

# ── Authentication ───────────────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Persistence ──────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
autosave_interval 300

# ── Logging ──────────────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ── Limits ───────────────────────────────────────────────────────────────────
max_connections 500
max_inflight_messages 40
max_queued_messages 1000
message_size_limit 10240

# ── Keep-alive ───────────────────────────────────────────────────────────────
max_keepalive 120
