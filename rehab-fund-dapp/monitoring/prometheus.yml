global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'rehab-monitor'
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ['monitor:8000']
        labels:
          service: "rehab-fund"
          network: "sepolia"

  - job_name: 'fastapi-backend'
    scrape_interval: 15s
    static_configs:
      - targets: ['fastapi-backend:8000']
        labels:
          service: "rehab-api"
