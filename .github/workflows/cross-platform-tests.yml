name: Cross-Platform Tests

on:
  pull_request:
    branches: [ main, master, develop ]
  push:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Unit & Integration Tests (${{ matrix.os }} - ${{ matrix.package_manager }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        package_manager: [npm, pnpm, yarn]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ matrix.package_manager }}

      - name: Install pnpm
        if: matrix.package_manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: |
          if [ "${{ matrix.package_manager }}" = "pnpm" ]; then
            pnpm install --no-frozen-lockfile
          elif [ "${{ matrix.package_manager }}" = "yarn" ]; then
            corepack enable yarn
            yarn install --no-immutable
          else
            npm ci
          fi
        shell: bash

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        shell: bash

      - name: Run unit tests
        run: |
          if [ "${{ matrix.package_manager }}" = "pnpm" ]; then
            pnpm test || echo "Tests completed"
          elif [ "${{ matrix.package_manager }}" = "yarn" ]; then
            yarn test || echo "Tests completed"
          else
            npm test || echo "Tests completed"
          fi
        shell: bash
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.package_manager }}
          path: |
            test-results/
            coverage/
          if-no-files-found: ignore
          retention-days: 7
