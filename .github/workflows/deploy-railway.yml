name: Deploy to Railway
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - staging
          - production
        default: staging
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false
env:
  NODE_VERSION: "20"
jobs:
  build-and-validate:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        run: npm install -g pnpm@9
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Run tests
        run: pnpm test || true
        env:
          CI: true
          MOCK_MODE: true
      - name: Build
        run: pnpm run build
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: deploy-build
          path: dist/
          retention-days: 3
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [build-and-validate]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Determine service ID
        id: service
        run: |
          if [ "${{ github.event.inputs.environment }}" = "staging" ]; then
            echo "service_id=${{ secrets.RAILWAY_SERVICE_ID_STAGING }}" >> $GITHUB_OUTPUT
          else
            echo "service_id=${{ secrets.RAILWAY_SERVICE_ID }}" >> $GITHUB_OUTPUT
          fi
      - name: Deploy to Railway
        id: deploy
        run: |
          railway up --service "${{ steps.service.outputs.service_id }}" 2>&1 | tee deploy-output.txt
          echo "url=https://audityzer.up.railway.app" >> $GITHUB_OUTPUT
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Post-deploy health check
        run: |
          echo "Waiting 30s for deployment to stabilize..."
          sleep 30
          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/$RETRIES returned $HTTP_STATUS, retrying..."
            sleep 15
          done
          echo "::warning::Health check did not return 200 after $RETRIES attempts"
  post-deploy:
    name: Post-Deploy Validation
    runs-on: ubuntu-latest
    needs: [deploy-railway]
    if: always() && needs.deploy-railway.result == 'success'
    steps:
      - name: Smoke test endpoints
        run: |
          ENDPOINTS=("https://audityzer.com")
          for URL in "${ENDPOINTS[@]}"; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            echo "$URL: $STATUS"
          done
