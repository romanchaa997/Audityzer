# GitOps Full Deploy Pipeline for AuditorSEC
# Based on continue-deployment-conversation.pdf
# Deploys to Railway + updates HuggingFace Space on push to main/safe-improvements

name: GitOps Full Deploy

on:
  push:
    branches:
      - main
      - safe-improvements
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # JOB 1: Security Gate (must pass before deploy)
  # ============================================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          pip install bandit safety semgrep 2>/dev/null || true

      - name: Run Bandit (Python SAST)
        run: |
          bandit -r . -x ./node_modules,./venv,./dist \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true
          echo "Bandit scan complete"

      - name: Run Safety (dependency CVE check)
        run: |
          safety check --json > safety-report.json || true
          echo "Safety check complete"

      - name: Check for secrets in code
        run: |
          grep -rn \
            -e 'password\s*=\s*["\x27][^"\x27]' \
            -e 'api_key\s*=\s*["\x27][^"\x27]' \
            -e 'secret\s*=\s*["\x27][^"\x27]' \
            --include='*.py' --include='*.js' --include='*.ts' \
            . 2>/dev/null | grep -v test | grep -v example || true
          echo "Secret scan complete"

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

  # ============================================================
  # JOB 2: Test Suite
  # ============================================================
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: security-gate
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: ['18', '20']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          CI: true

  # ============================================================
  # JOB 3: Deploy to Railway (production)
  # ============================================================
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [security-gate, test]
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://audityzer.up.railway.app
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service audityzer-bot --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Verify deployment health
        run: |
          sleep 30
          curl -sf https://audityzer.up.railway.app/health || echo "Health check endpoint not configured"

  # ============================================================
  # JOB 4: Update HuggingFace Space
  # ============================================================
  deploy-hf-space:
    name: Update HuggingFace Space
    runs-on: ubuntu-latest
    needs: [security-gate]
    timeout-minutes: 15
    if: contains(github.event.head_commit.modified, 'iot') || contains(github.event.head_commit.modified, 'app.py')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install HF Hub
        run: pip install huggingface-hub

      - name: Push to HuggingFace Space
        run: |
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          api.upload_folder(
              folder_path='.',
              repo_id='romanchaa997/iot-policy-simulator',
              repo_type='space',
              ignore_patterns=['node_modules', '.git', 'dist'],
          )
          print('HuggingFace Space updated successfully')
          EOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

  # ============================================================
  # JOB 5: Post-deploy notification
  # ============================================================
  notify:
    name: Notify Deploy Status
    runs-on: ubuntu-latest
    needs: [deploy-railway, deploy-hf-space]
    if: always()
    steps:
      - name: Send Telegram notification
        run: |
          STATUS="${{ needs.deploy-railway.result }}"
          COMMIT="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          MESSAGE="%F0%9F%9A%80 AuditorSEC Deploy: ${STATUS}%0ABranch: ${BRANCH}%0ACommit: ${COMMIT:0:7}%0ABy: ${{ github.actor }}"
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="${MESSAGE}" \
            -d parse_mode=HTML || true
