name: Sync Parallel Tasks
on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    outputs:
      healthy: ${{ steps.health.outputs.healthy }}
      body: ${{ steps.health.outputs.body }}
    steps:
      - name: Check bbbhhai.com /health
        id: health
        run: |
          HTTP_STATUS=$(curl -sf -o /tmp/health.json -w "%{http_code}" "https://bbbhhai.com/health" || echo "000")
          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
            echo "body=$(cat /tmp/health.json)" >> $GITHUB_OUTPUT
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "body={\"error\":\"unreachable\",\"code\":\"$HTTP_STATUS\"}" >> $GITHUB_OUTPUT
          fi

  sync-issues:
    runs-on: ubuntu-latest
    needs: health-check
    strategy:
      matrix:
        task:
          - { name: "AuditorSEC Mission Control", label: "G-STREAM", status_key: "mission-control" }
          - { name: "Parallel Deployment", label: "P-STREAM", status_key: "parallel-deploy" }
          - { name: "Hybrid Agentic", label: "R-STREAM", status_key: "hybrid-agentic" }
          - { name: "Startup Planning", label: "C-STREAM", status_key: "startup-planning" }
          - { name: "DNSSEC", label: "G-STREAM", status_key: "dnssec" }
          - { name: "Financial Model", label: "C-STREAM", status_key: "financial-model" }
    steps:
      - uses: actions/checkout@v4

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "${{ matrix.task.label }}" --color "0E8A16" --force 2>/dev/null || true

      - name: Create or update issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TITLE="[Sync] ${{ matrix.task.name }} — Status Update"
          BODY="## ${{ matrix.task.name }}\n\n**Last checked:** ${TIMESTAMP}\n**Health:** ${{ needs.health-check.outputs.healthy || 'pending' }}\n**Stream:** ${{ matrix.task.label }}\n\n---\n_Auto-generated by sync-parallel-tasks workflow_"

          EXISTING=$(gh issue list --label "${{ matrix.task.label }}" --search "${{ matrix.task.name }}" --state open --limit 1 --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "${{ matrix.task.label }}"
          fi
