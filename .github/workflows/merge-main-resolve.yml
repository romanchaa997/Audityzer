name: Merge main into safe-improvements (resolve conflicts)

on:
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: safe-improvements
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch main
        run: git fetch origin main

      - name: Merge main with ours strategy for conflicts
        run: |
          git merge origin/main -X ours --no-edit -m "Merge branch main into safe-improvements (resolve conflicts: keep safe-improvements versions)"

      - name: Push
        run: git push origin safe-improvements
