name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, safe-improvements ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  CACHE_DEPENDENCY_PATH: '**/package-lock.json'

jobs:
  test:
    name: Test & Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.x', '20.x']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

    - name: Install dependencies
      run: npm ci --prefer-offline

    - name: Run linter
      run: npm run lint --if-present

    - name: Run tests
      run: npm test --if-present

    - name: Build project
      run: npm run build --if-present

    - name: Upload build artifacts
      if: matrix.node-version == '20.x'
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: dist/
        retention-days: 7
        if-no-files-found: ignore

  security-scan:
    name: OWASP ZAP DAST Security Scan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      issues: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

    - name: Install dependencies
      run: npm ci --prefer-offline

    - name: Start application for DAST scan
      run: |
        npm run start --if-present &
        sleep 15
        echo "Application started for DAST scanning"
      env:
        NODE_ENV: test
        PORT: 3000

    - name: OWASP ZAP Full Scan
      uses: zaproxy/action-full-scan@v0.10.0
      with:
        target: 'http://localhost:3000'
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-a'
        fail_action: false
        allow_issue_writing: true
      continue-on-error: true

    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: zap-security-report
        path: report_html.html
        retention-days: 30
        if-no-files-found: ignore

  health-check:
    name: Health Endpoint Verification
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

    - name: Install dependencies
      run: npm ci --prefer-offline

    - name: Start application
      run: |
        npm run start --if-present &
        sleep 10
      env:
        NODE_ENV: test
        PORT: 3000

    - name: Verify health endpoint
      run: |
        MAX_RETRIES=5
        RETRY_DELAY=5
        for i in $(seq 1 $MAX_RETRIES); do
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check passed with status $HTTP_STATUS"
            exit 0
          fi
          echo "Attempt $i/$MAX_RETRIES: status=$HTTP_STATUS, retrying in ${RETRY_DELAY}s..."
          sleep $RETRY_DELAY
        done
        echo "Health endpoint not available (may not be implemented yet), continuing..."
        exit 0
