name: Security Gate MVP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript, typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: false

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sarif-summary:
    name: SARIF Upload Summary
    runs-on: ubuntu-latest
    needs: [codeql-analysis, dependency-audit, secret-scan]
    if: always()
    steps:
      - name: Security Gate Status
        run: |
          echo "=== AuditorSEC Security Gate Results ==="
          echo "CodeQL: ${{ needs.codeql-analysis.result }}"
          echo "Dependency Audit: ${{ needs.dependency-audit.result }}"
          echo "Secret Scan: ${{ needs.secret-scan.result }}"
          if [[ "${{ needs.codeql-analysis.result }}" == "failure" || "${{ needs.secret-scan.result }}" == "failure" ]]; then
            echo "CRITICAL: Security gate FAILED — merge blocked"
            exit 1
          fi
          echo "Security gate PASSED"
