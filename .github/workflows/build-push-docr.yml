name: Build & Push to DOCR

on:
  push:
    branches: [safe-improvements, main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'Dockerfile.mcp'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override'
        required: false
        default: ''

env:
  REGISTRY: registry.digitalocean.com/auditorsec
  IMAGE_MAIN: audityzer

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Login to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Audityzer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_MAIN }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_MAIN }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/romanchaa997/Audityzer
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Update K8s deployment tag
        run: |
          sed -i "s|image: registry.digitalocean.com/auditorsec/audityzer:.*|image: registry.digitalocean.com/auditorsec/audityzer:${{ steps.tag.outputs.tag }}|g" k8s/deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: update image tag to ${{ steps.tag.outputs.tag }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
