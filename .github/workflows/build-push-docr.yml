name: Build & Push to DOCR

on:
  push:
    branches: [safe-improvements, main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'Dockerfile.mcp'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override'
        required: false
        default: ''

env:
  REGISTRY: registry.digitalocean.com/auditorsec
  IMAGE_MAIN: audityzer
  IMAGE_MCP: audityzer-mcp

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Login to DOCR
        run: doctl registry login --expiry-seconds 600

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            SHA=$(echo ${{ github.sha }} | cut -c1-7)
            echo "tag=${SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build Audityzer image
        run: |
          docker build \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_MAIN }}:${{ steps.tag.outputs.tag }} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_MAIN }}:latest \
            --label "org.opencontainers.image.source=https://github.com/romanchaa997/Audityzer" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -f Dockerfile .

      - name: Build MCP Server image
        run: |
          if [ -f Dockerfile.mcp ]; then
            docker build \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_MCP }}:${{ steps.tag.outputs.tag }} \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_MCP }}:latest \
              -f Dockerfile.mcp .
          else
            echo "No Dockerfile.mcp found, skipping MCP build"
          fi

      - name: Push images
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_MAIN }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_MAIN }}:latest
          if [ -f Dockerfile.mcp ]; then
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_MCP }}:${{ steps.tag.outputs.tag }}
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_MCP }}:latest
          fi

      - name: Update K8s deployment image tag
        run: |
          sed -i "s|image: registry.digitalocean.com/auditorsec/audityzer:.*|image: registry.digitalocean.com/auditorsec/audityzer:${{ steps.tag.outputs.tag }}|g" k8s/deployment.yaml
          sed -i "s|image: registry.digitalocean.com/auditorsec/audityzer-mcp:.*|image: registry.digitalocean.com/auditorsec/audityzer-mcp:${{ steps.tag.outputs.tag }}|g" k8s/deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: update image tag to ${{ steps.tag.outputs.tag }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify deployment
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: always()
    steps:
      - name: Post status
        run: |
          echo "Build status: ${{ needs.build-and-push.result }}"
          echo "Image: ${{ env.REGISTRY }}/audityzer:${{ needs.build-and-push.outputs.tag || 'latest' }}"
