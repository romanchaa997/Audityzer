---
# HPA for the Anomaly Detection worker
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: audityzer-anomaly-hpa
  namespace: audityzer
  labels:
    app: audityzer
    component: anomaly-detector
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: audityzer-anomaly-worker
  minReplicas: 2  # Always at least 2 for 24/7 real-time monitoring
  maxReplicas: 16
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65  # Lower threshold for real-time latency
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
    - type: External
      external:
        metric:
          name: kafka_consumer_group_lag
          selector:
            matchLabels:
              topic: audityzer-transaction-stream
        target:
          type: AverageValue
          averageValue: '5'  # Low lag threshold for real-time
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0  # Immediate scale-up for real-time
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
# HPA for Prometheus/Grafana monitoring stack (if running in-cluster)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: audityzer-monitoring-hpa
  namespace: audityzer-monitoring
  labels:
    app: audityzer
    component: monitoring
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grafana
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
