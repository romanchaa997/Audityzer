# Kubernetes Horizontal Pod Autoscaler (HPA) Configuration
# For Audityzer microservices: each analyzer type scales independently
# based on queue depth (custom metrics) and CPU/memory utilization

---
# HPA for the main Audityzer API service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: audityzer-api-hpa
  namespace: audityzer
  labels:
    app: audityzer
    component: api
    tier: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: audityzer-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
      selectPolicy: Min

---
# HPA for the Access Control Analyzer worker
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: audityzer-access-control-hpa
  namespace: audityzer
  labels:
    app: audityzer
    component: access-control-analyzer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: audityzer-access-control-worker
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    # Scale based on Kafka/Redis queue depth (custom metric)
    - type: External
      external:
        metric:
          name: kafka_consumer_group_lag
          selector:
            matchLabels:
              topic: audityzer-access-control-scans
        target:
          type: AverageValue
          averageValue: '10'
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 600

