##############################################################################
# Self-Healing CI — Detects npm ci failures, auto-fixes package-lock.json
# Triggers on defense-audit pushes and workflow_dispatch
##############################################################################
name: Self-Healing CI

on:
  push:
    branches: [defense-audit]
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "Force regenerate package-lock.json"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

concurrency:
  group: self-healing-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18"

jobs:
  # ── Step 1: Attempt standard npm ci ───────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    outputs:
      npm_ci_failed: ${{ steps.npm-ci.outcome == 'failure' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: defense-audit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Attempt npm ci
        id: npm-ci
        continue-on-error: true
        run: npm ci --legacy-peer-deps

      - name: Check if force regenerate requested
        id: force-check
        run: |
          if [[ "${{ github.event.inputs.force_regenerate }}" == "true" ]]; then
            echo "force=true" >> "$GITHUB_OUTPUT"
          else
            echo "force=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run lint (if install succeeded)
        if: steps.npm-ci.outcome == 'success'
        continue-on-error: true
        run: npm run lint 2>/dev/null || true

      - name: Run tests (if install succeeded)
        if: steps.npm-ci.outcome == 'success'
        continue-on-error: true
        run: npm test 2>/dev/null || true

      - name: Report npm ci status
        if: always()
        run: |
          if [[ "${{ steps.npm-ci.outcome }}" == "failure" ]]; then
            echo "::warning::npm ci failed — self-healing will trigger"
          else
            echo "npm ci succeeded"
          fi

  # ── Step 2: Self-heal if npm ci failed ────────────────────────────────────
  self-heal:
    name: Self-Heal package-lock.json
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.npm_ci_failed == 'true' || github.event.inputs.force_regenerate == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: defense-audit
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove stale lockfile
        run: rm -f package-lock.json

      - name: Fresh npm install
        id: fresh-install
        run: |
          npm install --legacy-peer-deps 2>&1 | tee /tmp/npm-install.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Verify lockfile was generated
        run: |
          if [[ ! -f package-lock.json ]]; then
            echo "::error::package-lock.json was not generated"
            exit 1
          fi
          echo "package-lock.json regenerated ($(wc -l < package-lock.json) lines)"

      - name: Verify install works with new lockfile
        run: |
          rm -rf node_modules
          npm ci --legacy-peer-deps

      - name: Commit and push fixed lockfile
        run: |
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "No changes to package-lock.json"
          else
            git commit -m "fix: auto-regenerate package-lock.json [self-heal]

          Triggered by npm ci failure in CI.
          Node version: ${{ env.NODE_VERSION }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            git push origin defense-audit
            echo "::notice::package-lock.json regenerated and pushed"
          fi

      - name: Notify Telegram (success)
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -n "$TELEGRAM_BOT_TOKEN" && -n "$TELEGRAM_CHAT_ID" ]]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{
                \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
                \"text\": \"🔧 *Self-Heal Successful*\n\npackage-lock.json regenerated and pushed.\nBranch: defense-audit\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"parse_mode\": \"Markdown\"
              }"
          fi

      - name: Notify Telegram (failure)
        if: failure()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -n "$TELEGRAM_BOT_TOKEN" && -n "$TELEGRAM_CHAT_ID" ]]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{
                \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
                \"text\": \"❌ *Self-Heal Failed*\n\npackage-lock.json could not be regenerated.\nBranch: defense-audit\nManual intervention needed.\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"parse_mode\": \"Markdown\"
              }"
          fi

  # ── Step 3: Verify the fix ───────────────────────────────────────────────
  verify:
    name: Verify Self-Heal
    runs-on: ubuntu-latest
    needs: self-heal
    if: success()
    steps:
      - name: Checkout (latest)
        uses: actions/checkout@v4
        with:
          ref: defense-audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify npm ci works
        run: npm ci --legacy-peer-deps

      - name: Verify build
        continue-on-error: true
        run: npm run build 2>/dev/null || echo "Build step skipped or not configured"

      - name: Final status
        run: echo "::notice::Self-healing verified — npm ci succeeds with regenerated lockfile"
