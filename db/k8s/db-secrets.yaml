apiVersion: v1
kind: Secret
metadata:
  name: audityzer-db-secrets
  namespace: audityzer
type: Opaque
stringData:
  postgres-url: "${DATABASE_URL}"
  railway-pg-host: "interchange.proxy.rlwy.net"
  railway-pg-port: "47123"
  railway-pg-user: "postgres"
  railway-pg-pass: "${PG_PASSWORD}"
  railway-pg-db: "railway"
