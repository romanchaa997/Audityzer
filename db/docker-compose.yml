version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: uhip2a-postgres
    environment:
      POSTGRES_DB: auditorsec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./seeds/001_seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: uhip2a-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auditorsec
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
