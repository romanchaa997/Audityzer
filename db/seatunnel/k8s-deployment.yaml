apiVersion: apps/v1
kind: Deployment
metadata:
  name: seatunnel-cdc
  namespace: audityzer
  labels:
    app: seatunnel-cdc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seatunnel-cdc
  template:
    metadata:
      labels:
        app: seatunnel-cdc
    spec:
      containers:
      - name: seatunnel
        image: apache/seatunnel:2.3.5
        command: ["/opt/seatunnel/bin/seatunnel.sh"]
        args: ["--config", "/etc/seatunnel/postgres-cdc-sync.conf", "-m", "local"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: config
          mountPath: /etc/seatunnel
        envFrom:
        - secretRef:
            name: audityzer-db-secrets
      volumes:
      - name: config
        configMap:
          name: seatunnel-configs
