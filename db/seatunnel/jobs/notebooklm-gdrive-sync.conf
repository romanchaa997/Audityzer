env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  Http {
    url = "http://audityzer-api:8000/api/v1/notebooks?sync_status=pending"
    method = "GET"
    format = "json"
    schema = {
      fields {
        notebook_id = "string"
        notebook_url = "string"
        title = "string"
        domain = "string"
      }
    }
  }
}

sink {
  Http {
    url = "http://audityzer-api:8000/api/v1/notebooks/sync"
    method = "POST"
    headers = {"Content-Type" = "application/json"}
  }
}
