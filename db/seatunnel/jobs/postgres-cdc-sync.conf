env {
  parallelism = 2
  job.mode = "STREAMING"
  checkpoint.interval = 10000
}

source {
  Postgres-CDC {
    server-name = "railway-primary"
    hostname = "${RAILWAY_PG_HOST}"
    port = 5432
    username = "${RAILWAY_PG_USER}"
    password = "${RAILWAY_PG_PASS}"
    database-name = "railway"
    schema-name = "public"
    table-list = [
      "public.files",
      "public.accounts",
      "public.engagements",
      "public.automations",
      "public.risk_events",
      "public.media_catalog",
      "public.notebook_catalog",
      "public.competitive_intelligence"
    ]
    decoding.plugin.name = "pgoutput"
    slot.name = "seatunnel_cdc_slot"
  }
}

transform {
  # Add sync metadata
  FieldMapper {
    field_mapper = {
      "_synced_at" = "now()"
      "_source" = "'railway'"
    }
  }
}

sink {
  Jdbc {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://${K8S_PG_HOST}:5432/audityzer"
    user = "${K8S_PG_USER}"
    password = "${K8S_PG_PASS}"
    generate_sink_sql = true
    database = "audityzer"
    primary_keys = ["id"]
    support_upsert_by_query_primary_key_exist = true
  }
}
