# Railway deployment configuration for Audityzer
# AuditorSEC Defense Audit — server.js entry point
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --no-frozen-lockfile"

[deploy]
startCommand = "node bin/audityzer.js start"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1

[service]
internalPort = 8080
